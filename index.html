<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>阿布潘水產 - 智能決策系統</title>
    
    <!-- 這裡就是讓手機抓取正確 Logo 的地方！ -->
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="icon" type="image/png" href="logo.png">

    <!-- 隱藏 Safari 的 UI，讓它看起來更像原生 App -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        /* 讓鑲嵌的視窗全螢幕，沒有邊框 */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <!-- 這裡放你原本 Streamlit 的網址 -->
    <iframe src="https://abupan.streamlit.app/"></iframe>
</body>
</html>
